<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriftSlider — Cards 效果</title>
  <link rel="stylesheet" href="demo-common.css">
  <style>
    body { max-width: 960px; }

    .controls {
      margin-top: 24px;
      padding: 20px;
      background: #fff;
      border-radius: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 24px;
    }
    .controls h3 {
      grid-column: 1 / -1;
      margin: 8px 0 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #86868b;
      border-top: 1px solid #e8e8ed;
      padding-top: 12px;
    }
    .controls h3:first-child { border-top: none; margin-top: 0; padding-top: 0; }
    .controls label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .controls label span:first-child { min-width: 130px; }
    .controls input[type="range"] { flex: 1; }
    .controls .val { min-width: 48px; text-align: right; font-variant-numeric: tabular-nums; }
    .controls select { padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; }
    .controls .dimmed { opacity: 0.35; pointer-events: none; }

    pre { white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <a class="back" href="index.html">&larr; 返回展示頁</a>
  <h1>Cards 效果</h1>
  <p class="desc">使用 <code>effect: 'cards'</code> 搭配 EffectCards 模組，產生卡片式堆疊輪播效果（Stack / Diagonal / Flip）</p>

  <section class="drift-slider" aria-label="Cards 範例輪播">
    <div class="drift-track">
      <ul class="drift-list">
        <li class="drift-slide"><div class="slide-content slide-1">Slide 1</div></li>
        <li class="drift-slide"><div class="slide-content slide-2">Slide 2</div></li>
        <li class="drift-slide"><div class="slide-content slide-3">Slide 3</div></li>
        <li class="drift-slide"><div class="slide-content slide-4">Slide 4</div></li>
        <li class="drift-slide"><div class="slide-content slide-5">Slide 5</div></li>
        <li class="drift-slide"><div class="slide-content slide-6">Slide 6</div></li>
      </ul>
    </div>
    <button class="drift-arrow drift-arrow--prev" aria-label="上一張" type="button"></button>
    <button class="drift-arrow drift-arrow--next" aria-label="下一張" type="button"></button>
    <div class="drift-pagination"></div>
  </section>

  <div class="controls">
    <!-- Slider options -->
    <h3>Slider 設定</h3>
    <label>
      <span>mode</span>
      <select id="ctrl-mode">
        <option value="stack" selected>stack</option>
        <option value="diagonal">diagonal</option>
        <option value="flip">flip</option>
      </select>
    </label>
    <label>
      <span>loop</span>
      <select id="ctrl-loop">
        <option value="false" selected>false</option>
        <option value="true">true</option>
      </select>
    </label>
    <label>
      <span>autoplay</span>
      <select id="ctrl-autoplay">
        <option value="false" selected>false</option>
        <option value="true">true</option>
      </select>
    </label>
    <label>
      <span>speed</span>
      <input type="range" id="ctrl-speed" min="200" max="1200" step="100" value="500">
      <span class="val" id="val-speed">500</span>
    </label>

    <!-- Cards effect options -->
    <h3>Cards 參數</h3>
    <label>
      <span>direction</span>
      <select id="ctrl-direction">
        <option value="tl-br" selected>tl-br</option>
        <option value="bl-tr">bl-tr</option>
        <option value="tr-bl">tr-bl</option>
        <option value="br-tl">br-tl</option>
        <option value="auto">auto</option>
      </select>
    </label>
    <label>
      <span>offsetX</span>
      <input type="range" id="ctrl-offsetX" min="0" max="100" value="30">
      <span class="val" id="val-offsetX">30</span>
    </label>
    <label>
      <span>offsetY</span>
      <input type="range" id="ctrl-offsetY" min="0" max="100" value="30">
      <span class="val" id="val-offsetY">30</span>
    </label>
    <label>
      <span>scale</span>
      <input type="range" id="ctrl-scale" min="50" max="100" value="92">
      <span class="val" id="val-scale">0.92</span>
    </label>
    <label>
      <span>opacity</span>
      <input type="range" id="ctrl-opacity" min="0" max="100" value="85">
      <span class="val" id="val-opacity">0.85</span>
    </label>
    <label>
      <span>overlay</span>
      <select id="ctrl-overlay">
        <option value="true" selected>true</option>
        <option value="false">false</option>
      </select>
    </label>
    <label>
      <span>shadow</span>
      <select id="ctrl-shadow">
        <option value="true" selected>true</option>
        <option value="false">false</option>
      </select>
    </label>

    <!-- Diagonal settings -->
    <h3>Diagonal 設定</h3>
    <label id="lbl-diagonal">
      <span>diagonalMultiplier</span>
      <input type="range" id="ctrl-diagonalMul" min="10" max="50" value="25">
      <span class="val" id="val-diagonalMul">2.5</span>
    </label>

    <!-- Flip settings -->
    <h3>Flip 設定</h3>
    <label id="lbl-flip">
      <span>flipAxis</span>
      <select id="ctrl-flipAxis">
        <option value="Y" selected>Y</option>
        <option value="X">X</option>
      </select>
    </label>
  </div>

  <pre id="code-output"></pre>

  <script src="../dist/drift-slider.umd.js"></script>
  <script>
    var DS = DriftSlider;
    var currentSlider = null;

    function val(id) { return document.getElementById(id).value; }
    function num(id) { return Number(val(id)); }
    function bool(id) { return val(id) === 'true'; }

    function getCardsParams() {
      return {
        mode: val('ctrl-mode'),
        direction: val('ctrl-direction'),
        offsetX: num('ctrl-offsetX'),
        offsetY: num('ctrl-offsetY'),
        scale: num('ctrl-scale') / 100,
        opacity: num('ctrl-opacity') / 100,
        diagonalMultiplier: num('ctrl-diagonalMul') / 10,
        flipAxis: val('ctrl-flipAxis'),
        overlay: bool('ctrl-overlay'),
        overlayColor: 'rgba(0,0,0,0.15)',
        shadow: bool('ctrl-shadow'),
        shadowColor: 'rgba(0,0,0,0.25)',
        shadowBlur: 20,
      };
    }

    function updateDisplay() {
      document.getElementById('val-speed').textContent = val('ctrl-speed');
      document.getElementById('val-offsetX').textContent = val('ctrl-offsetX');
      document.getElementById('val-offsetY').textContent = val('ctrl-offsetY');
      document.getElementById('val-scale').textContent = (num('ctrl-scale') / 100).toFixed(2);
      document.getElementById('val-opacity').textContent = (num('ctrl-opacity') / 100).toFixed(2);
      document.getElementById('val-diagonalMul').textContent = (num('ctrl-diagonalMul') / 10).toFixed(1);

      // Dim irrelevant sections
      var mode = val('ctrl-mode');
      document.getElementById('lbl-diagonal').classList.toggle('dimmed', mode !== 'diagonal');
      document.getElementById('lbl-flip').classList.toggle('dimmed', mode !== 'flip');
    }

    function updateCode(cardsParams) {
      var isLoop = bool('ctrl-loop');
      var isAutoplay = bool('ctrl-autoplay');
      var speed = num('ctrl-speed');

      var modules = 'Navigation, Pagination, EffectCards, A11y';
      if (isAutoplay) modules = 'Navigation, Pagination, Autoplay, EffectCards, A11y';

      var lines = [
        "new DriftSlider('.my-slider', {",
        "  modules: [" + modules + "],",
        "  effect: 'cards',",
        "  speed: " + speed + ",",
      ];
      if (isLoop) lines.push("  loop: true,");
      if (isAutoplay) lines.push("  autoplay: { enabled: true, delay: 3000 },");
      lines.push(
        "  cardsEffect: {",
        "    mode: '" + cardsParams.mode + "',",
        "    direction: '" + cardsParams.direction + "',",
        "    offsetX: " + cardsParams.offsetX + ",",
        "    offsetY: " + cardsParams.offsetY + ",",
        "    scale: " + cardsParams.scale + ",",
        "    opacity: " + cardsParams.opacity + ","
      );
      if (cardsParams.mode === 'diagonal') {
        lines.push("    diagonalMultiplier: " + cardsParams.diagonalMultiplier + ",");
      }
      if (cardsParams.mode === 'flip') {
        lines.push("    flipAxis: '" + cardsParams.flipAxis + "',");
      }
      lines.push(
        "    overlay: " + cardsParams.overlay + ",",
        "    shadow: " + cardsParams.shadow + ",",
        "  },",
        "});"
      );
      document.getElementById('code-output').textContent = lines.join('\n');
    }

    function createSlider() {
      if (currentSlider) {
        currentSlider.destroy(true);
        currentSlider = null;
      }

      var cardsParams = getCardsParams();
      var isLoop = bool('ctrl-loop');
      var isAutoplay = bool('ctrl-autoplay');
      var speed = num('ctrl-speed');

      updateDisplay();
      updateCode(cardsParams);

      var modules = [DS.Navigation, DS.Pagination, DS.EffectCards, DS.A11y];
      if (isAutoplay) modules.splice(2, 0, DS.Autoplay);

      var opts = {
        modules: modules,
        effect: 'cards',
        speed: speed,
        cardsEffect: cardsParams,
      };

      if (isLoop) opts.loop = true;
      if (isAutoplay) opts.autoplay = { enabled: true, delay: 3000 };

      currentSlider = new DS.DriftSlider('.drift-slider', opts);
      window.slider = currentSlider;
    }

    // Bind all controls
    var controls = document.querySelectorAll('.controls input, .controls select');
    for (var i = 0; i < controls.length; i++) {
      controls[i].addEventListener('input', createSlider);
      controls[i].addEventListener('change', createSlider);
    }

    createSlider();
  </script>
</body>
</html>
